<div
  class="fixed z-50 select-none overflow-hidden cal-fade-in"
  [style.left.px]="posX()"
  [style.top.px]="posY()"
  [style.width.px]="width()"
  style="
    background: rgba(10, 10, 12, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px !important;
    box-shadow: 0 24px 60px rgba(0,0,0,0.85) !important;
    font-family: 'Inter', system-ui, sans-serif;
    color: #ffffff;
  "
  (mousedown)="onDragStart($event)">

  <!-- ─── HEADER: Weekly / Monthly Tabs & Settings ─── -->
  <div class="flex items-center justify-between px-5 pt-5 pb-3">
    <div class="flex items-center gap-1 bg-black/40 p-1" style="border-radius: 12px !important;">
      <button 
        (click)="setViewMode('weekly')"
        class="px-4 py-1.5 text-xs font-bold transition-all duration-200"
        [style.background]="viewMode() === 'weekly' ? '#ffffff' : 'transparent'"
        [style.color]="viewMode() === 'weekly' ? '#000000' : 'rgba(255,255,255,0.6)'"
        style="border-radius: 8px !important;">
        Semana
      </button>
      <button 
        (click)="setViewMode('monthly')"
        class="px-4 py-1.5 text-xs font-bold transition-all duration-200"
        [style.background]="viewMode() === 'monthly' ? '#ffffff' : 'transparent'"
        [style.color]="viewMode() === 'monthly' ? '#000000' : 'rgba(255,255,255,0.6)'"
        style="border-radius: 8px !important;">
        Mes
      </button>
    </div>

    <div class="flex items-center gap-2">
      <!-- Settings cog -->
      <button 
        (click)="toggleSettings()"
        class="p-2 transition-colors hover:bg-white/10 text-white/70 hover:text-white"
        style="border-radius: 50% !important;">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      
      <!-- Close button -->
      <button 
        (click)="close.emit()"
        class="p-2 transition-colors hover:bg-white/10 text-white/70 hover:text-white"
        style="border-radius: 50% !important;">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- ─── INLINE SETTINGS PANEL ─── -->
  <div *ngIf="showSettings()" class="px-5 py-3 bg-white/5 border-y border-white/5 flex flex-col gap-3">
    <div class="flex items-center justify-between">
      <span class="text-xs uppercase tracking-wider font-bold text-white/60">Configuración de Fecha</span>
      <button (click)="resetToday()" class="text-[10px] text-pink-400 hover:text-pink-300 font-bold uppercase tracking-widest">
        Restablecer
      </button>
    </div>
    
    <div class="flex gap-2">
      <input 
        type="date" 
        [(ngModel)]="todayOverrideInput" 
        class="flex-1 bg-black/40 border border-white/10 text-white text-xs px-3 py-2 outline-none focus:border-pink-500"
        style="border-radius: 8px !important;">
      <button 
        (click)="applyDateOverride(); toggleSettings()"
        class="px-4 py-2 bg-gradient-to-br from-pink-500 to-orange-400 text-white text-xs font-bold transition-all hover:opacity-90"
        style="border-radius: 8px !important;">
        Aplicar
      </button>
    </div>
  </div>

  <!-- ─── DATE DISPLAY & NAVIGATION ─── -->
  <div *ngIf="!showSettings()" class="px-5 py-4 flex items-center justify-between">
    <div class="flex flex-col">
      <span class="text-xs uppercase tracking-widest font-semibold text-white/50 mb-0.5">{{ yearLabel() }}</span>
      <h2 class="text-3xl font-black tracking-tight bg-gradient-to-r from-white to-white/70 bg-clip-text text-transparent">
        {{ monthLabel() }}
      </h2>
    </div>
    <div class="flex items-center gap-1">
      <button 
        (click)="prevMonth()" 
        class="p-2 text-white/60 hover:text-white hover:bg-white/5 transition-colors"
        style="border-radius: 50% !important;">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button 
        (click)="nextMonth()" 
        class="p-2 text-white/60 hover:text-white hover:bg-white/5 transition-colors"
        style="border-radius: 50% !important;">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <!-- ─── CALENDAR BODY ─── -->
  <div class="px-5 pb-5">
    
    <!-- MONTHLY VIEW -->
    <div *ngIf="viewMode() === 'monthly'">
      <!-- Day Headers -->
      <div class="grid grid-cols-7 mb-2 text-center">
        <div *ngFor="let h of dayHeaders" class="text-[10px] font-bold text-white/40 uppercase tracking-wider">
          {{ h }}
        </div>
      </div>

      <!-- Month grid -->
      <div class="grid grid-cols-7 gap-y-1">
        <div *ngFor="let cell of cells()"
          (click)="selectCell(cell)"
          class="flex items-center justify-center h-10 cursor-pointer text-xs font-semibold relative transition-all"
          [style.color]="cell.isSelected ? '#ffffff' : cell.isCurrentMonth ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.25)'"
          [style.background]="cell.isSelected ? 'linear-gradient(135deg, #ec4899, #f97316)' : 'transparent'"
          style="border-radius: 50% !important;">
          
          <!-- Today ring when not selected -->
          <span *ngIf="cell.isToday && !cell.isSelected"
            class="absolute inset-0.5 border-2 border-pink-500/80"
            style="border-radius: 50% !important;"></span>

          {{ cell.dayNum }}
        </div>
      </div>
    </div>

    <!-- WEEKLY VIEW (Horizontal row of 7 days) -->
    <div *ngIf="viewMode() === 'weekly'" class="overflow-x-auto scrollbar-hide -mx-2 px-2 py-1">
      <div class="flex justify-between gap-2.5">
        <div *ngFor="let cell of weekCells()"
          (click)="selectCell(cell)"
          class="flex flex-col items-center gap-1.5 flex-1 min-w-[36px] py-2.5 cursor-pointer relative transition-all"
          [style.background]="cell.isSelected ? 'linear-gradient(135deg, #ec4899, #f97316)' : 'rgba(255,255,255,0.03)'"
          [style.border]="cell.isSelected ? '1px solid transparent' : '1px solid rgba(255,255,255,0.08)'"
          style="border-radius: 14px !important;">

          <span class="text-[9px] font-bold tracking-widest uppercase"
            [style.color]="cell.isSelected ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.4)'">
            {{ dayHeaders[(cell.date.getDay() + 6) % 7] }}
          </span>

          <span class="text-sm font-black"
            [style.color]="cell.isSelected ? '#ffffff' : 'rgba(255,255,255,0.9)'">
            {{ cell.dayNum }}
          </span>

          <!-- Today small dot indicator -->
          <span *ngIf="cell.isToday"
            class="w-1.5 h-1.5 rounded-full"
            [style.background-color]="cell.isSelected ? '#ffffff' : '#ec4899'"
            style="border-radius: 50% !important;"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- ─── FOOTER ACTIONS / NEW EVENT PANEL ─── -->
  <div class="mt-1 bg-white/5 border-t border-white/5 px-5 py-4">
    <!-- Header showing current selected date selection -->
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs font-semibold text-white/50 flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5 text-pink-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        {{ headerDate() }}
      </span>
      <button 
        *ngIf="!showNewEvent()" 
        (click)="openNewEventPanel()"
        class="text-xs font-bold text-pink-400 hover:text-pink-300 transition-colors uppercase tracking-widest">
        + Nuevo Evento
      </button>
    </div>

    <!-- NEW EVENT MENU -->
    <div *ngIf="showNewEvent()" class="flex flex-col gap-2.5 bg-black/40 p-3.5 border border-white/5 cal-fade-in" style="border-radius: 16px !important;">
      <div class="flex items-center justify-between">
        <span class="text-[10px] uppercase tracking-wider font-bold text-white/40">Opciones de Evento</span>
        <button (click)="closeNewEvent()" class="text-white/40 hover:text-white text-xs">
          ✕
        </button>
      </div>

      <div class="grid grid-cols-2 gap-2 mt-1">
        <button 
          (click)="openCreate.emit(); closeNewEvent()" 
          class="flex flex-col items-center justify-center p-3 gap-2 bg-white/5 hover:bg-white/10 border border-white/10 transition-all text-center text-xs font-semibold"
          style="border-radius: 12px !important;">
          <svg class="w-5 h-5 text-pink-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Desplegar Pizarra
        </button>
        <button 
          (click)="openJoin.emit(); closeNewEvent()" 
          class="flex flex-col items-center justify-center p-3 gap-2 bg-white/5 hover:bg-white/10 border border-white/10 transition-all text-center text-xs font-semibold"
          style="border-radius: 12px !important;">
          <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Ingresar Código
        </button>
      </div>
    </div>
  </div>

</div>
