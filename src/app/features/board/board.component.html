<!-- ═══ PANTALLA DE CARGA (con fundido de salida) ═══ -->
<app-loading #loadingRef *ngIf="showLoading" (fadeOutDone)="showLoading = false"></app-loading>

<div class="relative w-screen h-screen overflow-hidden bg-darkBg canvas-wrapper cursor-grab select-none" 
     *ngIf="!isLoading"

     [class.cursor-grabbing]="isPanning"
     [style.background-position]="panX + 'px ' + panY + 'px'"
     style="background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 40px 40px;"
     (mousedown)="startPan($event)">
  
  <!-- Interface de Control (UI Topbar) -->
  <header class="absolute top-0 left-0 w-full p-4 glass z-50 flex items-center justify-between pointer-events-auto shadow-none !border-t-0 !border-x-0 border-white/10">
    <div class="flex items-center gap-4">
      <button (click)="goBack()" class="text-gray-400 hover:text-white transition-colors font-bold text-xl px-2 cursor-pointer">&larr;</button>
      <div class="border-l border-white/20 pl-4">
         <h1 class="text-sm font-bold tracking-widest text-white uppercase mb-1">{{ boardName }}</h1>
         <div class="flex items-center gap-2">
           <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
           <span class="text-[10px] uppercase text-emerald-500 font-mono tracking-widest">{{ boardRole }}</span>
         </div>
      </div>
    </div>
    
    <div class="flex items-center gap-4">

      <!-- Estado: Guardando -->
      <div *ngIf="isSaving" class="text-[10px] text-neonBlue uppercase tracking-widest animate-pulse font-semibold">
        Guardando...
      </div>

      <!-- Estado: Subiendo imagen a Cloudinary -->
      <div *ngIf="isUploadingImage" class="flex items-center gap-2 text-[10px] text-amber-400 uppercase tracking-widest font-semibold animate-pulse">
        <svg class="w-3 h-3 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        Subiendo a Cloudinary...
      </div>

      <!-- Error de subida -->
      <div *ngIf="uploadError" class="text-[10px] text-red-400 uppercase tracking-widest font-mono max-w-[200px] truncate" [title]="uploadError">
        ⚠ {{ uploadError }}
      </div>

      <!-- Input file oculto — activado programáticamente por triggerImageUpload() -->
      <input
        #imageInput
        type="file"
        accept="image/jpeg,image/png,image/gif,image/webp,image/svg+xml"
        class="hidden"
        (change)="onImageFileSelected($event)"
      />

      <!-- Botón: Subir Imagen -->
      <button
        (click)="triggerImageUpload()"
        [disabled]="isUploadingImage"
        class="border border-white/10 bg-darkSurface hover:bg-white/5 text-white py-2 px-5 text-xs font-semibold transition-colors duration-200 disabled:opacity-40 flex items-center gap-2 uppercase tracking-widest"
      >
        <!-- Icono imagen -->
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        Imagen
      </button>

      <!-- Dropdown Figuras -->
      <div class="relative group z-50 pointer-events-auto mr-1">
        <button class="bg-darkSurface border border-white/10 hover:bg-white/5 text-gray-300 hover:text-white py-1.5 px-3 rounded flex items-center gap-2 text-xs font-semibold tracking-widest uppercase transition-colors">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l10 18H2z"></path></svg>
          Figuras
        </button>
        <div class="absolute top-full left-0 mt-1 bg-darkSurface border border-white/10 rounded shadow-lg opacity-0 group-hover:opacity-100 invisible group-hover:visible transition-all flex flex-col p-1 gap-1 min-w-[120px]">
           <button (click)="addShape('square')" title="Cuadrado" class="flex items-center gap-2 px-2 py-1.5 hover:bg-white/10 rounded text-xs text-gray-300 hover:text-white text-left w-full"><svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"></rect></svg> Cuadrado</button>
           <button (click)="addShape('circle')" title="Círculo" class="flex items-center gap-2 px-2 py-1.5 hover:bg-white/10 rounded text-xs text-gray-300 hover:text-white text-left w-full"><svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"></circle></svg> Círculo</button>
           <button (click)="addShape('triangle')" title="Triángulo" class="flex items-center gap-2 px-2 py-1.5 hover:bg-white/10 rounded text-xs text-gray-300 hover:text-white text-left w-full"><svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 4 22 20 2 20"></polygon></svg> Triángulo</button>
        </div>
      </div>

      <!-- Dropdown Líneas -->
      <div class="relative group z-50 pointer-events-auto mr-2">
        <button class="bg-darkSurface border border-white/10 hover:bg-white/5 text-gray-300 hover:text-white py-1.5 px-3 rounded flex items-center gap-2 text-xs font-semibold tracking-widest uppercase transition-colors">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Líneas
        </button>
        <div class="absolute top-full left-0 mt-1 bg-darkSurface border border-white/10 rounded shadow-lg opacity-0 group-hover:opacity-100 invisible group-hover:visible transition-all flex flex-col p-1 gap-1 min-w-[120px]">
           <button (click)="addShape('arrow')" title="Flecha" class="flex items-center gap-2 px-2 py-1.5 hover:bg-white/10 rounded text-xs text-gray-300 hover:text-white text-left w-full"><svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg> Flecha</button>
           <button (click)="addShape('line')" title="Línea Recta" class="flex items-center gap-2 px-2 py-1.5 hover:bg-white/10 rounded text-xs text-gray-300 hover:text-white text-left w-full"><svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="5" x2="19" y2="19"></line></svg> Recta</button>
        </div>
      </div>

      <!-- Botón: Añadir Nota -->
      <button (click)="addNote()" class="btn-primary flex items-center justify-center gap-2 text-xs uppercase tracking-widest font-bold !py-2 px-6">
        <span>+</span> Adhesivo
      </button>
    </div>
  </header>

  <!-- Capa de Lienzo Infinito Colaborativo -->
  <div class="absolute inset-0 z-10 w-full h-full pointer-events-auto canvas-layer"
       [style.transform]="'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')'"
       style="transform-origin: 0 0;">

    <!-- Nodos (Post-its y Fotos) renderizables -->
    <ng-container *ngFor="let note of canvasService.elements(); trackBy: trackByNoteId">

      <!-- ─── ELEMENTO: NOTA DE TEXTO ──────────────────────────────────────── -->
      <div *ngIf="note.type === 'note'"
           class="absolute shadow-none ring-1 ring-white/10 group group-note"
           [style.left.px]="note.x"
           [style.top.px]="note.y"
           [style.transform]="'rotate(' + (note.rotation || 0) + 'deg)'"
           [ngStyle]="{'background-color': note.color}"
           (mousedown)="startDrag($event, note)"
           style="width: 250px; border-radius: 0; transform-origin: center center;">

        <!-- Rotate Handle -->
        <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-4 h-4 bg-white/10 hover:bg-white/30 border border-white/20 hover:border-white/50 rounded-full cursor-grab opacity-0 group-[.group-note]:hover:opacity-100 transition-all pointer-events-auto flex items-center justify-center p-0.5"
             (mousedown)="startRotate($event, note)">
             <div class="w-1.5 h-1.5 rounded-full bg-white/70"></div>
        </div>

        <!-- Barra de control superior -->
        <div class="bg-black/40 px-2 py-0.5 flex justify-between items-center select-none cursor-move">
          <span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Node-{{note.id | slice:0:4}}</span>
          <button (click)="deleteNote(note.id)" class="text-red-500/80 hover:text-red-400 font-black cursor-pointer px-1">×</button>
        </div>

        <!-- Textarea de contenido -->
        <textarea
          [ngModel]="note.content"
          (ngModelChange)="updateContent(note, $event)"
          class="w-full h-32 p-3 bg-transparent text-gray-200 focus:outline-none resize-none text-sm font-medium focus:ring-[1px] focus:ring-neonBlue/50"
          placeholder="Escribe texto plano...">
        </textarea>
      </div>

      <!-- ─── ELEMENTO: IMAGEN CLOUDINARY ──────────────────────────────────── -->
      <div *ngIf="note.type === 'image'"
           class="absolute ring-1 ring-white/10 cursor-move select-none group group-img"
           [style.left.px]="note.x"
           [style.top.px]="note.y"
           [style.transform]="'rotate(' + (note.rotation || 0) + 'deg)'"
           [style.width.px]="note.width || 300"
           [style.height.px]="(note.height || 200) + 24"
           (mousedown)="startDrag($event, note)"
           style="border-radius: 0; transform-origin: center center;">

        <!-- Rotate Handle -->
        <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-4 h-4 bg-white/10 hover:bg-white/30 border border-white/20 hover:border-white/50 rounded-full cursor-grab opacity-0 group-[.group-img]:hover:opacity-100 transition-all pointer-events-auto flex items-center justify-center p-0.5"
             (mousedown)="startRotate($event, note)">
             <div class="w-1.5 h-1.5 rounded-full bg-white/70"></div>
        </div>

        <!-- Barra de control superior del nodo imagen -->
        <div class="bg-black/60 px-2 py-0.5 flex justify-between items-center select-none h-6">
          <div class="flex items-center gap-1.5">
            <!-- Icono de imagen -->
            <svg class="w-2.5 h-2.5 text-amber-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span class="text-[9px] uppercase tracking-widest text-amber-400/80 font-bold truncate max-w-[140px]">{{ note.content || 'Imagen' }}</span>
          </div>
          <!-- Botón eliminar -->
          <button (click)="deleteNote(note.id)" class="text-red-500/80 hover:text-red-400 font-black cursor-pointer px-1 flex-shrink-0">×</button>
        </div>

        <!-- Imagen de Cloudinary -->
        <img
          [src]="note.imageUrl"
          [alt]="note.content || 'Imagen del canvas'"
          [style.width.px]="note.width || 300"
          [style.height.px]="note.height || 200"
          class="block object-contain bg-black/20 pointer-events-none"
          draggable="false"
        />

        <!-- Indicador de esquina: Cloudinary -->
        <div class="absolute bottom-0 right-0 opacity-0 group-hover:opacity-100 transition-opacity bg-black/60 px-1.5 py-0.5 text-[8px] text-amber-400/60 font-mono tracking-wider pointer-events-none">
          CDN
        </div>
      </div>

      <!-- ─── ELEMENTO: FIGURA SVG ──────────────────────────────────── -->
      <div *ngIf="note.type === 'shape'"
           class="absolute cursor-move select-none group group-shape"
           [class.ring-2]="selectedShapeId === note.id"
           [class.ring-neonBlue]="selectedShapeId === note.id"
           [class.ring-offset-2]="selectedShapeId === note.id"
           [class.ring-offset-transparent]="selectedShapeId === note.id"
           [style.left.px]="note.x"
           [style.top.px]="note.y"
           [style.transform]="'rotate(' + (note.rotation || 0) + 'deg)'"
           [style.width.px]="note.width"
           [style.height.px]="note.height"
           style="transform-origin: center center;"
           (mousedown)="startDrag($event, note)"
           (click)="selectShape($event, note)">
           
         <!-- Rotate Handle (visible en hover o cuando está seleccionado) -->
         <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-4 h-4 bg-white/10 hover:bg-white/30 border border-white/20 hover:border-white/50 rounded-full cursor-grab transition-all pointer-events-auto flex items-center justify-center p-0.5"
              [class.opacity-0]="selectedShapeId !== note.id"
              [class.opacity-100]="selectedShapeId === note.id"
              (mousedown)="startRotate($event, note)">
              <div class="w-1.5 h-1.5 rounded-full bg-white/70"></div>
         </div>
           
         <!-- SVG Render (Automáticamente escalable gracias al viewBox preserveAspectRatio="none") -->
         <svg *ngIf="note.shapeType !== 'line' && note.shapeType !== 'arrow'" class="w-full h-full pointer-events-none drop-shadow-md" viewBox="0 0 100 100" preserveAspectRatio="none">
           <rect *ngIf="note.shapeType === 'square'" width="100" height="100" rx="4" [attr.fill]="note.color" />
           <circle *ngIf="note.shapeType === 'circle'" cx="50" cy="50" r="50" [attr.fill]="note.color" />
           <polygon *ngIf="note.shapeType === 'triangle'" points="50,0 100,100 0,100" [attr.fill]="note.color" />
         </svg>
         
         <svg *ngIf="note.shapeType === 'line'" class="w-full h-full pointer-events-none overflow-visible drop-shadow-md">
            <line x1="0" [attr.y1]="((note.height || 20) / 2)" [attr.x2]="note.width || 100" [attr.y2]="((note.height || 20) / 2)" [attr.stroke]="note.color" stroke-width="4" stroke-linecap="round" />
         </svg>
         
         <svg *ngIf="note.shapeType === 'arrow'" class="w-full h-full pointer-events-none overflow-visible drop-shadow-md">
            <defs>
               <marker [attr.id]="'arrowhead-' + note.id" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                  <polyline points="1 1, 5 3, 1 5" fill="none" [attr.stroke]="note.color" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
               </marker>
            </defs>
            <line x1="4" [attr.y1]="((note.height || 20) / 2)" [attr.x2]="(note.width || 100) - 8" [attr.y2]="((note.height || 20) / 2)" [attr.stroke]="note.color" stroke-width="4" stroke-linecap="round" [attr.marker-end]="'url(#arrowhead-' + note.id + ')'" />
         </svg>

         <!-- ═══ TOOLBAR PERSISTENTE: Aparece al hacer CLICK sobre la figura ═══ -->
         <div *ngIf="selectedShapeId === note.id"
              class="absolute -top-[68px] left-1/2 -translate-x-1/2 bg-[#0d0d10]/95 backdrop-blur-sm rounded-lg flex items-center gap-1 p-1.5 pointer-events-auto border border-white/15 whitespace-nowrap shadow-2xl z-50"
              (mousedown)="$event.stopPropagation()" (click)="$event.stopPropagation()">

            <!-- ✕ BORRAR -->
            <button (click)="deleteNote(note.id)" title="Eliminar figura"
                    class="w-7 h-7 flex items-center justify-center text-red-400 hover:text-red-300 hover:bg-red-500/20 rounded transition-colors cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
            </button>

            <div class="w-px h-5 bg-white/15 mx-0.5"></div>

            <!-- 🎨 COLOR: Selector HEX + Presets rápidos -->
            <label class="w-6 h-6 rounded-full overflow-hidden cursor-pointer flex items-center justify-center hover:scale-110 transition-transform shadow-sm ring-1 ring-white/30 relative" title="Color personalizado (HEX)" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);">
               <span class="text-black text-[11px] drop-shadow-md font-black leading-none">+</span>
               <input type="color" [value]="note.color" (change)="changeColor(note.id, $any($event.target).value)" (mousedown)="$event.stopPropagation()" class="absolute inset-0 w-full h-full cursor-pointer opacity-0" />
            </label>
            <button (click)="changeColor(note.id, '#EF4444')" title="Rojo" class="w-5 h-5 rounded-full bg-red-500 hover:scale-110 transition-transform shadow-sm ring-1 ring-white/10 cursor-pointer"></button>
            <button (click)="changeColor(note.id, '#3B82F6')" title="Azul" class="w-5 h-5 rounded-full bg-blue-500 hover:scale-110 transition-transform shadow-sm ring-1 ring-white/10 cursor-pointer"></button>
            <button (click)="changeColor(note.id, '#10B981')" title="Verde" class="w-5 h-5 rounded-full bg-emerald-500 hover:scale-110 transition-transform shadow-sm ring-1 ring-white/10 cursor-pointer"></button>
            <button (click)="changeColor(note.id, '#F59E0B')" title="Ámbar" class="w-5 h-5 rounded-full bg-amber-500 hover:scale-110 transition-transform shadow-sm ring-1 ring-white/10 cursor-pointer"></button>
            <button (click)="changeColor(note.id, '#8B5CF6')" title="Violeta" class="w-5 h-5 rounded-full bg-violet-500 hover:scale-110 transition-transform shadow-sm ring-1 ring-white/10 cursor-pointer"></button>

            <div class="w-px h-5 bg-white/15 mx-0.5"></div>

            <!-- 🔄 ROTAR (click = +45°) -->
            <button (click)="rotateShape(note.id)" title="Rotar 45°"
                    class="w-7 h-7 flex items-center justify-center text-gray-300 hover:text-white hover:bg-white/10 rounded transition-colors cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
              </svg>
            </button>

            <div class="w-px h-5 bg-white/15 mx-0.5"></div>

            <!-- 🔀 DEFORMAR -->
            <button (click)="deformShape(note.id, 'wider')" title="Más ancho"
                    class="w-7 h-7 flex items-center justify-center text-gray-300 hover:text-white hover:bg-white/10 rounded transition-colors cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="17 8 21 12 17 16"></polyline>
                <polyline points="7 8 3 12 7 16"></polyline>
                <line x1="3" y1="12" x2="21" y2="12"></line>
              </svg>
            </button>
            <button (click)="deformShape(note.id, 'taller')" title="Más alto"
                    class="w-7 h-7 flex items-center justify-center text-gray-300 hover:text-white hover:bg-white/10 rounded transition-colors cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="8 7 12 3 16 7"></polyline>
                <polyline points="8 17 12 21 16 17"></polyline>
                <line x1="12" y1="3" x2="12" y2="21"></line>
              </svg>
            </button>
            <button (click)="deformShape(note.id, 'reset')" title="Restablecer proporciones"
                    class="w-7 h-7 flex items-center justify-center text-gray-300 hover:text-white hover:bg-white/10 rounded transition-colors cursor-pointer text-[10px] font-bold">
              1:1
            </button>
         </div>

         <!-- Resize Handle Inferior Derecho (visible en hover o seleccionado) -->
         <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-transparent cursor-nwse-resize transition-opacity pointer-events-auto border-b-2 border-r-2 border-white/50"
              [class.opacity-0]="selectedShapeId !== note.id"
              [class.opacity-100]="selectedShapeId === note.id"
              (mousedown)="startResize($event, note)">
         </div>
      </div>

    </ng-container>

    <!-- Visualización Fantasma de Aliados Activos (Cursores WSS) -->
    <ng-container *ngFor="let kv of canvasService.activeCursors() | keyvalue">
      <div *ngIf="kv.value.userId !== authService.currentUser()?.sub"
           class="absolute pointer-events-none transition-all duration-75 ease-linear z-40"
           [style.left.px]="kv.value.position.x"
           [style.top.px]="kv.value.position.y">

        <!-- Flecha Vectorizada del Cursor con color dinámico del usuario -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
             [style.filter]="'drop-shadow(0 0 8px ' + (kv.value.cursorColor || '#3B82F6') + '80)'">
          <path d="M4.35716 3.6358L20.25 10.9632L11.5179 13.985M4.35716 3.6358L10.3259 19.985L11.5179 13.985M4.35716 3.6358L11.5179 13.985"
                [attr.stroke]="kv.value.cursorColor || '#3B82F6'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4.35716 3.6358L20.25 10.9632L11.5179 13.985L10.3259 19.985L4.35716 3.6358Z"
                [attr.fill]="kv.value.cursorColor || '#3B82F6'"/>
        </svg>

        <!-- Tooltip con el displayName o email del usuario -->
        <div class="ml-4 mt-1 px-2 py-0.5 text-[10px] rounded-none text-white font-bold tracking-wider shadow-none flex max-w-[150px] truncate"
             [style.background-color]="kv.value.cursorColor || '#3B82F6'">
          {{ kv.value.displayName || kv.value.email.split('@')[0] }}
        </div>
      </div>
    </ng-container>

  </div>

  <!-- UI: Barra de Control de Zoom -->
  <div class="fixed right-4 top-1/2 -translate-y-1/2 z-[60] flex flex-col items-center gap-2 bg-black/60 backdrop-blur border border-white/10 p-2 rounded-full shadow-xl transition-opacity duration-300 pointer-events-auto"
       [ngClass]="isZoomingUiVisible ? 'opacity-100' : 'opacity-0 hover:opacity-100'">
    <button (click)="changeZoom(0.1)" class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20 hover:scale-110 text-white flex items-center justify-center font-bold transition-all text-xl shadow-inner">+</button>
    
    <div class="text-[11px] font-mono text-gray-300 font-bold bg-white/10 py-3 px-0.5 w-[36px] text-center rounded-full my-1 shadow-inner select-none cursor-default" [title]="'Factor: ' + zoom.toFixed(2)">
      {{ (zoom * 100) | number:'1.0-0' }}%
    </div>
    
    <button (click)="changeZoom(-0.1)" class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20 hover:scale-110 text-white flex items-center justify-center font-bold transition-all text-2xl shadow-inner pb-1">-</button>
  </div>

  <!-- Notificaciones Toast (Conexiones / Desconexiones) -->
  <div class="fixed bottom-4 left-4 z-[70] flex flex-col gap-2 pointer-events-none">
    <div *ngFor="let notif of canvasService.notifications()" 
         class="px-4 py-2 text-xs font-bold tracking-widest uppercase border pointer-events-auto transition-all duration-300"
         [ngClass]="{
           'bg-emerald-500/20 text-emerald-400 border-emerald-500/30': notif.type === 'success',
           'bg-amber-500/20 text-amber-400 border-amber-500/30': notif.type === 'warning',
           'bg-neonBlue/20 text-neonBlue border-neonBlue/30': notif.type === 'info'
         }">
      {{ notif.message }}
    </div>
  </div>
</div>
